  eddyscout_networking: 85
  eddyscout_persistence: 85
  eddyscout_analytics: 85
  eddyscout_routing: 85
  eddyscout_localization: 85
  eddyscout_conditions: 85
  eddyscout_map: 85
  eddyscout_hydro_routing: 85
  eddyscout: 85
