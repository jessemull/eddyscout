# Per-package minimum line-coverage thresholds (percent).
# Enforced by scripts/check_coverage.sh after `flutter test --coverage`.
# Raise gradually as test coverage improves.

thresholds:
  eddyscout_core: 20
  eddyscout_design_system: 25
  eddyscout_networking: 50
  eddyscout_persistence: 45
  eddyscout_analytics: 5
  eddyscout_routing: 0
  eddyscout_localization: 0
  eddyscout_conditions: 40
  eddyscout_map: 45
  eddyscout_hydro_routing: 60
  eddyscout: 10
