name: eddyscout
description: "PNW paddling companion — Mapbox map with Portland-area launch pins."
publish_to: 'none'
version: 1.0.0+1

resolution: workspace

environment:
  sdk: ^3.11.4

dependencies:
  cupertino_icons: ^1.0.8
  eddyscout_analytics:
    path: ../../packages/analytics
  eddyscout_conditions:
    path: ../../packages/features/conditions
  eddyscout_core:
    path: ../../packages/core
  eddyscout_design_system:
    path: ../../packages/design_system
  eddyscout_hydro_routing:
    path: ../../packages/features/hydro_routing
  eddyscout_localization:
    path: ../../packages/localization
  eddyscout_map:
    path: ../../packages/features/map
  eddyscout_persistence:
    path: ../../packages/persistence
  eddyscout_routing:
    path: ../../packages/routing
  eddyscout_saved_routes:
    path: ../../packages/features/saved_routes
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  mapbox_maps_flutter: ^2.25.0
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.3.3

dev_dependencies:
  build_runner: ^2.4.14
  dio: ^5.7.0
  flutter_test:
    sdk: flutter
  go_router_builder: ^4.3.0
  integration_test:
    sdk: flutter
  mocktail: ^1.0.4
  riverpod_generator: ^4.0.4
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true

  assets:
    - assets/hydro/willamette_waterway.geojson
    - assets/hydro/columbia_lower_waterway.geojson
    - assets/hydro/columbia_gorge_waterway.geojson
    - assets/hydro/clackamas_waterway.geojson
    - assets/hydro/slough_waterway.geojson
    - assets/hydro/tualatin_waterway.geojson
    - assets/hydro/sandy_waterway.geojson
    - assets/hydro/confluence_bridges.json
    - assets/data/launch_reachability_index.json
    - assets/data/launch_suggested_trips_index.json
    - assets/data/unified_hydro_graph.bin
