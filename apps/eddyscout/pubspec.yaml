name: eddyscout
description: "PNW paddling companion — Mapbox map with Portland-area launch pins."
publish_to: 'none'
version: 1.0.0+1

resolution: workspace

environment:
  sdk: ^3.11.4

dependencies:
  cloud_functions: ^5.2.1
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  eddyscout_analytics:
    path: ../../packages/analytics
  eddyscout_conditions:
    path: ../../packages/features/conditions
  eddyscout_core:
    path: ../../packages/core
  eddyscout_design_system:
    path: ../../packages/design_system
  eddyscout_hydro_routing:
    path: ../../packages/features/hydro_routing
  eddyscout_localization:
    path: ../../packages/localization
  eddyscout_map:
    path: ../../packages/features/map
  eddyscout_networking:
    path: ../../packages/networking
  eddyscout_persistence:
    path: ../../packages/persistence
  eddyscout_routing:
    path: ../../packages/routing
  firebase_auth: ^5.3.4
  firebase_core: ^3.8.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.0.0
  go_router: ^17.2.3
  json_annotation: ^4.9.0
  mapbox_maps_flutter: ^2.24.3
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.3.3

dev_dependencies:
  build_runner: ^2.4.14
  flutter_test:
    sdk: flutter
  freezed: ^3.0.0
  go_router_builder: ^4.3.0
  golden_toolkit: ^0.15.0
  integration_test:
    sdk: flutter
  json_serializable: ^6.13.0
  mocktail: ^1.0.4
  riverpod_generator: ^4.0.3
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true

  assets:
    - assets/hydro/willamette_waterway.geojson
