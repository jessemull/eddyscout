name: eddyscout_workspace
publish_to: 'none'

environment:
  sdk: ^3.11.4

workspace:
  - apps/eddyscout
  - packages/core
  - packages/design_system
  - packages/networking
  - packages/persistence
  - packages/analytics
  - packages/routing
  - packages/localization
  - packages/features/map
  - packages/features/conditions
  - packages/features/hydro_routing

dev_dependencies:
  melos: ^7.8.1

dependency_overrides:
  source_gen: 4.2.0

melos:
  name: eddyscout
  sdkPath: auto

  command:
    bootstrap:
      runPubGetInParallel: true

  scripts:
    analyze:
      run: melos exec -- "dart analyze --fatal-infos"
      description: Run static analysis on all packages.

    format:
      run: melos exec -- "dart format --set-exit-if-changed ."
      description: Check formatting across all packages.

    format:fix:
      run: melos exec -- "dart format ."
      description: Apply formatting fixes across all packages.

    test:
      run: ./scripts/run_tests.sh
      description: Run tests in all packages that have a test directory.

    coverage:
      run: ./scripts/run_coverage.sh
      description: Run tests with coverage in all packages.

    gen:
      run: melos exec -- "dart run build_runner build --delete-conflicting-outputs"
      packageFilters:
        dependsOn: build_runner
      description: Run code generation.

    gen:check:
      run: |
        melos exec -- "dart run build_runner build --delete-conflicting-outputs"
        if [ -n "$(git status --porcelain '**/**.g.dart' '**/**.freezed.dart' '**/**.gr.dart')" ]; then
          echo "ERROR: Generated files are out of date. Run 'melos run gen' and commit."
          exit 1
        fi
      description: Verify generated code is up to date.

    clean:
      run: melos exec -- "flutter clean"
      description: Clean all packages.

    preflight:
      run: ./scripts/preflight.sh
      description: Run full preflight checks (format, analyze, test, codegen).

    ci:
      run: ./scripts/preflight.sh --ci
      description: Run CI-grade validation.
