name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool-versions
          channel: stable
          cache: true
      - run: dart pub get
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos exec -- "dart format --set-exit-if-changed ."

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool-versions
          channel: stable
          cache: true
      - run: dart pub get
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos exec --ignore=eddyscout -- "dart analyze --fatal-infos"
      - run: melos exec --scope=eddyscout -- "dart analyze --fatal-infos"
  codegen-drift:
    name: Codegen Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool-versions
          channel: stable
          cache: true
      - run: dart pub get
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: ./scripts/codegen_verify.sh

  golden:
    name: Golden Tests
    # Pin macOS version: macos-latest mixes 14/26 runners; font rasterization
    # differs enough to flake pixel goldens.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool-versions
          channel: stable
          cache: true
      # dart pub get resolves the workspace without copying iOS Firebase plugins;
      # melos bootstrap runs flutter pub get and can fail on macOS runners.
      - run: dart pub get
      - name: Disable macOS font smoothing for deterministic goldens
        run: defaults -currentHost write -g AppleFontSmoothing -int 0
      - working-directory: packages/design_system
        run: flutter test test/goldens
      - name: Restore macOS font smoothing
        if: always()
        run: defaults -currentHost write -g AppleFontSmoothing -int 2

  coverage:
    name: Tests and Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool-versions
          channel: stable
          cache: true
      - run: dart pub get
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: ./scripts/run_coverage.sh
      - run: ./scripts/check_coverage.sh

  import-boundaries:
    name: Import Boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool-versions
          channel: stable
          cache: true
      - run: dart pub get
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: ./scripts/check_imports.sh
      - run: ./scripts/check_architecture.sh

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      LIBGL_ALWAYS_SOFTWARE: '1'
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool-versions
          channel: stable
          cache: true
      - name: Linux desktop build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            xvfb libglu1-mesa libpulse0 at-spi2-core
      - run: dart pub get
      - run: dart pub global activate melos
      - run: melos bootstrap
      - name: Token gate
        working-directory: apps/eddyscout
        run: |
          xvfb-run -a -s '-screen 0 1280x720x24' \
            timeout 4m \
            flutter test integration_test/app_navigation_test.dart -d linux \
            --timeout 3m -r expanded
      - name: Map to launch detail journey
        working-directory: apps/eddyscout
        run: |
          xvfb-run -a -s '-screen 0 1280x720x24' \
            timeout 4m \
            flutter test integration_test/map_launch_detail_journey_test.dart -d linux \
            --dart-define=MAPBOX_ACCESS_TOKEN=pk.integration_test \
            --dart-define=INTEGRATION_MAP_STUB=true \
            --timeout 3m -r expanded
