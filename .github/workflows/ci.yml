name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool-versions
          channel: stable
          cache: true
      - run: dart pub get
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos exec -- "dart format --set-exit-if-changed ."

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool-versions
          channel: stable
          cache: true
      - run: dart pub get
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos exec --ignore=eddyscout -- "dart analyze --fatal-infos"
      - run: melos exec --scope=eddyscout -- "dart analyze --fatal-infos"

  codegen-drift:
    name: Codegen Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool-versions
          channel: stable
          cache: true
      - run: dart pub get
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: ./scripts/codegen_verify.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool-versions
          channel: stable
          cache: true
      - run: dart pub get
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos exec --fail-fast --concurrency=1 --dir-exists=test -- "flutter test --exclude-tags golden"

  golden:
    name: Golden Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool-versions
          channel: stable
          cache: true
      - run: dart pub get
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos exec --scope=eddyscout_design_system -- "flutter test test/goldens"

  coverage:
    name: Coverage Thresholds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool-versions
          channel: stable
          cache: true
      - run: dart pub get
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: melos exec --fail-fast --concurrency=1 --dir-exists=test -- "flutter test --coverage --exclude-tags golden"
      - run: ./scripts/check_coverage.sh

  import-boundaries:
    name: Import Boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool-versions
          channel: stable
          cache: true
      - run: dart pub get
      - run: dart pub global activate melos
      - run: melos bootstrap
      - run: ./scripts/check_imports.sh
      - run: ./scripts/check_architecture.sh

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .tool-versions
          channel: stable
          cache: true
      - name: Linux desktop build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            xvfb libglu1-mesa
      - run: dart pub get
      - run: dart pub global activate melos
      - run: melos bootstrap
      - name: Token gate
        working-directory: apps/eddyscout
        run: xvfb-run -a flutter test integration_test/app_navigation_test.dart -d linux
      - name: Map to launch detail journey
        working-directory: apps/eddyscout
        run: |
          xvfb-run -a flutter test integration_test/map_launch_detail_journey_test.dart -d linux \
            --dart-define=MAPBOX_ACCESS_TOKEN=pk.integration_test \
            --dart-define=INTEGRATION_MAP_STUB=true
