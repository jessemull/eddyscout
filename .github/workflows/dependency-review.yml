name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

# Requires Dependency graph enabled under repo Settings → Code security and analysis.
# Private repos also need GitHub Advanced Security; public repos work with graph alone.
jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
